name: Upload iCloud Photos

on:
  workflow_dispatch:
    inputs:
      icloud_link:
        description: 'iCloud shared link (e.g. https://share.icloud.com/photos/xxx)'
        required: true
        type: string
      folder:
        description: 'Destination folder name (images will go to client/public/images/{folder}/)'
        required: false
        default: ''
        type: string
      max_width:
        description: 'Max image width in pixels (0 = no resize)'
        required: false
        default: '1920'
        type: string
      quality:
        description: 'JPEG quality (1-100)'
        required: false
        default: '85'
        type: string

jobs:
  download-and-commit:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install sharp axios

      - name: Download and optimize iCloud photos
        run: node .github/scripts/icloud-download.mjs
        env:
          ICLOUD_LINK: ${{ inputs.icloud_link }}
          DEST_FOLDER: ${{ inputs.folder }}
          MAX_WIDTH: ${{ inputs.max_width }}
          QUALITY: ${{ inputs.quality }}

      - name: Check for new images
        id: check
        run: |
          if [ -n "$(git status --porcelain client/public/images/)" ]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "New images detected:"
            git status --short client/public/images/
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "No new images found."
          fi

      - name: Commit and push
        if: steps.check.outputs.has_changes == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add client/public/images/
          FOLDER="${{ inputs.folder }}"
          if [ -n "$FOLDER" ]; then
            MSG="Add photos to ${FOLDER} from iCloud"
          else
            MSG="Add photos from iCloud"
          fi
          COUNT=$(git diff --cached --name-only | wc -l | tr -d ' ')
          git commit -m "${MSG} (${COUNT} images)"
          git push
